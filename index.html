<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Notas - Agile Development</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0f1c3f 0%, #1e2761 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 36px 32px;
      max-width: 460px;
      width: 100%;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
      animation: fadeInUp 0.5s ease;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-block;
      background: #eef2ff;
      color: #1e2761;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 16px;
      letter-spacing: 0.5px;
    }

    h1 {
      font-size: 22px;
      color: #1e2761;
      margin-bottom: 24px;
    }

    .grupo {
      margin-bottom: 18px;
    }

    .grupo-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 2px solid #eef2ff;
    }

    .grupo-titulo {
      font-size: 12px;
      font-weight: 700;
      color: #1e2761;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .grupo-titulo.externa {
      color: #7c5e10;
    }

    .live-resultado {
      font-size: 13px;
      font-weight: 700;
      color: #1e2761;
      background: #eef2ff;
      padding: 2px 10px;
      border-radius: 10px;
      transition: background 0.2s, color 0.2s;
    }

    .live-resultado.invalido {
      background: #fee2e2;
      color: #b91c1c;
    }

    .fila {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .campo {
      flex: 1;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 4px;
    }

    .peso {
      color: #9ca3af;
      font-weight: 400;
    }

    input.nota-input {
      width: 100%;
      padding: 10px 10px;
      font-size: 15px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.15s, transform 0.15s;
      text-align: center;
      font-weight: 600;
      color: #1e2761;
    }

    input.nota-input:focus {
      border-color: #5b8def;
    }

    input.nota-input.shake {
      border-color: #ef4444;
      animation: shake 0.35s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    .externa-box {
      background: #fffbeb;
      border-radius: 10px;
      padding: 14px;
    }

    .externa-box .grupo-header {
      border-bottom-color: #fef3c7;
    }

    button {
      width: 100%;
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      color: #ffffff;
      background: #1e2761;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover {
      background: #141b4d;
    }

    button:active {
      transform: scale(0.98);
    }

    #resultado-box {
      display: none;
      margin-top: 20px;
      text-align: center;
      padding: 18px;
      border-radius: 12px;
      opacity: 0;
      transform: translateY(12px) scale(0.96);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    #resultado-box.mostrar {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    #resultado-box.aprobado {
      background: #ecfdf5;
      border: 2px solid #10b981;
    }

    #resultado-box.desaprobado {
      background: #fef2f2;
      border: 2px solid #ef4444;
    }

    .emoji {
      display: block;
      font-size: 46px;
      line-height: 1;
      margin-bottom: 8px;
      animation: popIn 0.5s ease;
    }

    @keyframes popIn {
      0%   { transform: scale(0); opacity: 0; }
      60%  { transform: scale(1.25); opacity: 1; }
      100% { transform: scale(1); }
    }

    #promo-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    #resultado-box.aprobado #promo-label { color: #059669; }
    #resultado-box.desaprobado #promo-label { color: #dc2626; }

    #promo-valor {
      font-size: 32px;
      font-weight: 700;
    }

    #resultado-box.aprobado #promo-valor { color: #065f46; }
    #resultado-box.desaprobado #promo-valor { color: #7f1d1d; }

    #estado-texto {
      margin-top: 6px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    #resultado-box.aprobado #estado-texto { color: #059669; }
    #resultado-box.desaprobado #estado-texto { color: #dc2626; }

    .footer {
      margin-top: 20px;
      font-size: 11px;
      color: #9ca3af;
      text-align: center;
    }

    /* Snackbar */
    .snackbar {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%) translateY(20px);
      background: #1f2937;
      color: #fff;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
      z-index: 1000;
      max-width: 90%;
      text-align: center;
      pointer-events: none;
    }

    .snackbar.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .snackbar.error { background: #dc2626; }
    .snackbar.info  { background: #1e2761; }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">DEVOPS · CI/CD</span>
    <h1>Calculadora de notas</h1>

    <div class="grupo">
      <div class="grupo-header">
        <span class="grupo-titulo">Proceso 1</span>
        <span class="live-resultado" id="ep1-box">EP1: <span id="ep1-live">0.00</span></span>
      </div>
      <div class="fila">
        <div class="campo">
          <label>Sub 1 <span class="peso">(30%)</span></label>
          <input class="nota-input" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="2" id="s1" placeholder="0-20" oninput="manejarEntrada(this, actualizarEP1)">
        </div>
        <div class="campo">
          <label>Sub 2 <span class="peso">(30%)</span></label>
          <input class="nota-input" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="2" id="s2" placeholder="0-20" oninput="manejarEntrada(this, actualizarEP1)">
        </div>
        <div class="campo">
          <label>Sub 3 <span class="peso">(40%)</span></label>
          <input class="nota-input" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="2" id="s3" placeholder="0-20" oninput="manejarEntrada(this, actualizarEP1)">
        </div>
      </div>
    </div>

    <div class="grupo">
      <div class="grupo-header">
        <span class="grupo-titulo">Proceso 2</span>
        <span class="live-resultado" id="ep2-box">EP2: <span id="ep2-live">0.00</span></span>
      </div>
      <div class="fila">
        <div class="campo">
          <label>Sub 4 <span class="peso">(30%)</span></label>
          <input class="nota-input" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="2" id="s4" placeholder="0-20" oninput="manejarEntrada(this, actualizarEP2)">
        </div>
        <div class="campo">
          <label>Sub 5 <span class="peso">(30%)</span></label>
          <input class="nota-input" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="2" id="s5" placeholder="0-20" oninput="manejarEntrada(this, actualizarEP2)">
        </div>
        <div class="campo">
          <label>Sub 6 <span class="peso">(40%)</span></label>
          <input class="nota-input" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="2" id="s6" placeholder="0-20" oninput="manejarEntrada(this, actualizarEP2)">
        </div>
      </div>
    </div>

    <div class="grupo externa-box">
      <div class="grupo-header">
        <span class="grupo-titulo externa">Evaluaciones externas</span>
      </div>
      <div class="fila">
        <div class="campo">
          <label>Ev. parcial <span class="peso">(EVP)</span></label>
          <input class="nota-input" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="2" id="evp" placeholder="0-20" oninput="manejarEntrada(this)">
        </div>
        <div class="campo">
          <label>Ev. final <span class="peso">(EVF)</span></label>
          <input class="nota-input" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="2" id="evf" placeholder="0-20" oninput="manejarEntrada(this)">
        </div>
      </div>
    </div>

    <button onclick="calcular()">Calcular nota</button>

    <div id="resultado-box">
      <span class="emoji" id="emoji"></span>
      <div id="promo-label">Nota final</div>
      <div id="promo-valor"></div>
      <div id="estado-texto"></div>
    </div>

    <p class="footer">Desplegado automáticamente vía GitHub Actions</p>
  </div>

  <script>
    // ---------- Snackbar (reemplaza los alert()) ----------
    function mostrarSnackbar(mensaje, tipo = 'error') {
      const anterior = document.getElementById('snackbar');
      if (anterior) anterior.remove();

      const snack = document.createElement('div');
      snack.id = 'snackbar';
      snack.className = 'snackbar ' + tipo;
      snack.textContent = mensaje;
      document.body.appendChild(snack);

      requestAnimationFrame(() => snack.classList.add('show'));
      setTimeout(() => {
        snack.classList.remove('show');
        setTimeout(() => snack.remove(), 300);
      }, 2800);
    }

    // ---------- Restricción de inputs: solo números 0-20 (máx. 2 dígitos) ----------
    function manejarEntrada(input, callback) {
      const original = input.value;
      // solo dígitos, máximo 2 caracteres
      let limpio = original.replace(/[^0-9]/g, '').slice(0, 2);

      if (limpio !== '') {
        const num = parseInt(limpio, 10);
        if (num > 20) limpio = '20';
      }

      if (limpio !== original) {
        input.value = limpio;
        if (original !== '') {
          input.classList.add('shake');
          setTimeout(() => input.classList.remove('shake'), 350);
          mostrarSnackbar('Solo se permiten números entre 0 y 20', 'error');
        }
      }

      if (typeof callback === 'function') callback();
    }

    // ---------- Cálculos ----------
    function calcularEP(a, b, c) {
      return (a * 0.30) + (b * 0.30) + (c * 0.40);
    }

    function leerValor(id) {
      const raw = document.getElementById(id).value;
      return raw === '' ? null : parseInt(raw, 10);
    }

    function actualizarEP1() {
      const valores = [leerValor('s1'), leerValor('s2'), leerValor('s3')];
      const box = document.getElementById('ep1-box');
      if (valores.some(v => v === null)) {
        document.getElementById('ep1-live').textContent = '0.00';
        box.classList.remove('invalido');
        return;
      }
      box.classList.remove('invalido');
      document.getElementById('ep1-live').textContent = calcularEP(...valores).toFixed(2);
    }

    function actualizarEP2() {
      const valores = [leerValor('s4'), leerValor('s5'), leerValor('s6')];
      const box = document.getElementById('ep2-box');
      if (valores.some(v => v === null)) {
        document.getElementById('ep2-live').textContent = '0.00';
        box.classList.remove('invalido');
        return;
      }
      box.classList.remove('invalido');
      document.getElementById('ep2-live').textContent = calcularEP(...valores).toFixed(2);
    }

    function calcular() {
      const campos = ['s1', 's2', 's3', 's4', 's5', 's6', 'evp', 'evf'];
      const valores = {};

      for (const id of campos) {
        const val = leerValor(id);
        if (val === null) {
          mostrarSnackbar('Completa todos los campos antes de calcular', 'error');
          document.getElementById(id).classList.add('shake');
          setTimeout(() => document.getElementById(id).classList.remove('shake'), 350);
          return;
        }
        valores[id] = val;
      }

      const ep1 = calcularEP(valores.s1, valores.s2, valores.s3);
      const ep2 = calcularEP(valores.s4, valores.s5, valores.s6);
      const promo = Math.round(((0.20 * ep1) + (0.30 * valores.evp) + (0.20 * ep2) + (0.30 * valores.evf)) * 100) / 100;

      const aprobado = promo > 10;
      const box = document.getElementById('resultado-box');

      document.getElementById('promo-valor').textContent = promo.toFixed(2);
      document.getElementById('emoji').textContent = aprobado ? '😄' : '😢';
      document.getElementById('estado-texto').textContent = aprobado ? 'Aprobado' : 'Desaprobado';

      box.classList.remove('mostrar');
      box.className = aprobado ? 'aprobado' : 'desaprobado';
      box.style.display = 'block';
      requestAnimationFrame(() => box.classList.add('mostrar'));

      mostrarSnackbar(aprobado ? '¡Cálculo listo, aprobado! 🎉' : 'Cálculo listo', 'info');
    }
  </script>
</body>
</html>
